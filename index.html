<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0C1E3F" />

    <title>GroupGrid</title>
    <meta
      name="description"
      content="GroupGrid cross-checks your event registration list against your flight, hotel, and car files, so gaps like an unbooked attendee or a room reserved for someone not registered surface before the event, not at check-in."
    />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Social sharing -->
    <meta property="og:title" content="GroupGrid" />
    <meta
      property="og:description"
      content="Cross-check event registration against travel files and catch the gaps before check-in."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://groupgrid.io" />
    <meta name="twitter:card" content="summary" />

    <!-- Fonts: Manrope (body) + Poppins (display) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Poppins:wght@600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
