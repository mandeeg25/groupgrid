name: Deploy Staging

on:
  push:
    # TEMP: 3-setup-staging-vercel added only to test this pipeline before it merges to development.
    # Remove it from this list once the test run succeeds — development should be the only trigger.
    branches: [development, 3-setup-staging-vercel]
  workflow_dispatch: {} # only usable once this trigger exists on the default branch (main) — not yet

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel project settings + env vars
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN_STAGING }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID_STAGING }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_STAGING }}

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN_STAGING }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID_STAGING }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_STAGING }}

      - name: Deploy prebuilt output
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN_STAGING }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID_STAGING }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_STAGING }}
